name: Portfolio delivery verification

on:
  push:
    branches:
      - feat/portfolio-certifications

permissions:
  contents: write

jobs:
  verify-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      -