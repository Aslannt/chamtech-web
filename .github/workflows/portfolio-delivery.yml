name: Portfolio delivery verification

on:
  push:
    branches:
      - feat/portfolio-certifications
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare source archive
        run: |
          mkdir -p delivery
          git archive --format=zip --output=delivery/chamtech-web-certifications.zip HEAD

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: chamtech-web-certifications
          path: delivery/chamtech-web-certifications.zip
          if-no-files-found: error
          retention-days: 14
